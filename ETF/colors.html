<!DOCTYPE html>
<html data-platform="xq" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>色票庫</title>
  <link rel="stylesheet" href="css/rd-app.css">
  <link rel="stylesheet" href="css/proto-supplement.css">
  <style>
    /* ── Design System Shell ── */
    body { display: flex; min-height: 100vh; margin: 0; background: var(--color-gray-125); font-family: -apple-system, sans-serif; }
    .ds-sidebar {
      width: 160px; flex-shrink: 0;
      position: sticky; top: 0; height: 100vh;
      background: var(--color-gray-100);
      border-right: 1px solid var(--color-gray-200);
      display: flex; flex-direction: column;
    }
    .ds-logo {
      padding: 14px;
      font-size: 13px; font-weight: 700; color: var(--color-gray-1000);
      border-bottom: 1px solid var(--color-gray-200);
    }
    .ds-nav { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
    .ds-nav-item {
      display: flex; align-items: center;
      padding: 7px 10px; border-radius: 6px;
      font-size: 13px; font-weight: 500;
      color: var(--color-gray-600);
      text-decoration: none;
      transition: background .12s, color .12s;
    }
    .ds-nav-item:hover { background: var(--color-gray-150); color: var(--color-gray-1000); }
    .ds-nav-item.active { background: var(--color-tint-100); color: var(--color-theme-550); font-weight: 600; }
    .ds-ctrl {
      padding: 12px 14px;
      border-top: 1px solid var(--color-gray-200);
      display: flex; flex-direction: column; gap: 10px;
    }
    .ds-ctrl-lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: var(--color-gray-500); margin-bottom: 4px; }
    .ds-ctrl-pills { display: flex; }
    .ds-ctrl-pills .cl-topbar-btn { flex: 1; text-align: center; padding: 4px 6px; }
    .ds-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    /* ── Topbar ── */
    .cl-topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--color-gray-100);
      border-bottom: 1px solid var(--color-gray-200);
      padding: 10px 24px;
      display: flex; align-items: center;
    }
    .cl-topbar-title { font-size: 15px; font-weight: 700; color: var(--color-gray-1000); }
    .cl-topbar-btn {
      font-size: 12px; padding: 4px 12px;
      border-radius: 6px; border: 1px solid var(--color-gray-300);
      background: var(--color-gray-125); color: var(--color-gray-700);
      cursor: pointer;
    }
    .cl-topbar-btn.active {
      background: var(--color-gray-250);
      color: var(--color-gray-1000);
      font-weight: 600;
    }

    /* ── Color palette viewer ── */
    .cl-page { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }
    .pal-group { margin-bottom: 36px; }
    .pal-group-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--color-gray-500);
      padding-bottom: 8px; border-bottom: 1px solid var(--color-gray-200);
      margin-bottom: 16px;
    }
    .pal-row { margin-bottom: 20px; }
    .pal-row-header {
      font-size: 12px; font-weight: 600; color: var(--color-gray-600);
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .pal-row-header.is-used { color: var(--color-gray-1000); }
    .pal-used-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--color-theme-500); flex-shrink: 0;
    }
    /* Platform rows */
    .pal-platform-block { display: flex; flex-direction: column; gap: 6px; }
    .pal-platform-row   { display: flex; align-items: flex-start; gap: 6px; }
    .pal-plat-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--color-gray-500); width: 36px; flex-shrink: 0; padding-top: 16px;
    }
    .pal-plat-xqm { color: #a78bfa; }
    /* Swatches */
    .pal-swatches { display: flex; flex-wrap: wrap; gap: 4px; }
    .swatch { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
    .swatch-box {
      width: 44px; height: 44px; border-radius: 6px;
      border: 1px solid rgba(128,128,128,0.15);
      transition: transform .1s;
    }
    .swatch:hover .swatch-box { transform: scale(1.08); }
    .swatch-step { font-size: 10px; color: var(--color-gray-500); }
    .swatch-hex  { font-size: 9px; color: var(--color-gray-400); font-family: ui-monospace,monospace; letter-spacing: -0.02em; }
    /* XQM row: dashed border signals "pending definition" */
    .swatch-xqm .swatch-box { border: 1px dashed rgba(167,139,250,0.45) !important; }
    .swatch-note { font-size: 8px; color: var(--color-gray-500); text-align: center; max-width: 52px; line-height: 1.2; }
    .copied-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--color-gray-800); color: var(--color-gray-100);
      font-size: 12px; padding: 6px 16px; border-radius: 20px;
      opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 200;
    }
    .copied-toast.show { opacity: 1; }

    /* 覆蓋 proto-supplement.css 的全域 sticky 表頭規則 */
    .cl-page .table-head { position: relative; top: auto; }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="ds-sidebar">
  <div class="ds-logo">Design System</div>
  <nav class="ds-nav">
    <a href="colors.html"     class="ds-nav-item active">色票庫</a>
    <a href="components.html" class="ds-nav-item">元件庫</a>
  </nav>
  <div class="ds-ctrl">
    <div>
      <div class="ds-ctrl-lbl">Platform</div>
      <div class="ds-ctrl-pills">
        <button class="cl-topbar-btn active" id="btn-xq"  onclick="setPlatformView('xq')"  style="border-radius:6px 0 0 6px;border-right-width:0.5px;">XQ</button>
        <button class="cl-topbar-btn"        id="btn-xqm" onclick="setPlatformView('xqm')" style="border-radius:0 6px 6px 0;border-left-width:0.5px;">XQM</button>
      </div>
    </div>
    <div id="theme-ctrl">
      <div class="ds-ctrl-lbl">Theme</div>
      <div class="ds-ctrl-pills">
        <button class="cl-topbar-btn active" id="btn-dark"  onclick="setTheme('dark')"  style="border-radius:6px 0 0 6px;border-right-width:0.5px;">Dark</button>
        <button class="cl-topbar-btn"        id="btn-light" onclick="setTheme('light')" style="border-radius:0 6px 6px 0;border-left-width:0.5px;">Light</button>
      </div>
    </div>
  </div>
</aside>

<!-- ── Main ── -->
<div class="ds-main">
<div class="cl-topbar">
  <span class="cl-topbar-title">色票庫</span>
</div>

<div class="cl-page">
  <div id="color-palettes"></div>
  <div id="xqm-section" style="display:none;">
    <div id="xqm-palettes"></div>
  </div>
</div>
</div><!-- ds-main -->

<div class="copied-toast" id="toast"></div>

<script>
  const GRAY_STEPS = [100,125,150,200,250,300,350,400,450,500,550,600,650,700,750,800,850,900,950,1000];
  const STD_STEPS  = [100,150,200,250,300,350,400,450,500,550,600,650,700,750,800,850,900,950,1000];
  const PAL_GROUPS = [
    { title: 'Neutral', palettes: [
      { name: 'gray',   prefix: '--xq-gray',   steps: GRAY_STEPS },
    ]},
    { title: 'Brand', palettes: [
      { name: 'theme',  prefix: '--xq-theme',  steps: STD_STEPS },
      { name: 'tint',   prefix: '--xq-tint',   steps: STD_STEPS },
      { name: 'blue',   prefix: '--xq-blue',   steps: STD_STEPS },
    ]},
    { title: 'Spectrum', palettes: [
      { name: 'red',    prefix: '--xq-red',    steps: STD_STEPS },
      { name: 'green',  prefix: '--xq-green',  steps: STD_STEPS },
      { name: 'orange', prefix: '--xq-orange', steps: STD_STEPS },
      { name: 'yellow', prefix: '--xq-yellow', steps: STD_STEPS },
      { name: 'cyan',   prefix: '--xq-cyan',   steps: STD_STEPS },
      { name: 'purple', prefix: '--xq-purple', steps: STD_STEPS },
      { name: 'pink',   prefix: '--xq-pink',   steps: STD_STEPS },
    ]},
  ];


  const _probe = document.createElement('div');
  _probe.style.cssText = 'position:fixed;visibility:hidden;pointer-events:none;width:1px;height:1px;';
  document.body.appendChild(_probe);

  function _getHex(varName) {
    _probe.style.backgroundColor = `var(${varName},transparent)`;
    const rgb = getComputedStyle(_probe).backgroundColor;
    if (!rgb || rgb === 'transparent' || rgb === 'rgba(0, 0, 0, 0)') return null;
    const m = rgb.match(/[\d.]+/g);
    if (!m) return null;
    const hex = '#' + [+m[0], +m[1], +m[2]].map(n => n.toString(16).padStart(2,'0')).join('');
    const a = m[3] !== undefined ? parseFloat(m[3]) : 1;
    return a < 1 ? hex + Math.round(a*255).toString(16).padStart(2,'0') : hex;
  }

  /* 暫時切換 data-platform 來計算特定平台的色票值 */
  function _getHexFor(platform, varName) {
    const prev = document.documentElement.dataset.platform;
    document.documentElement.dataset.platform = platform;
    const hex = _getHex(varName);
    document.documentElement.dataset.platform = prev;
    return hex;
  }

  function buildPalettes() {
    const container = document.getElementById('color-palettes');
    container.innerHTML = '';
    PAL_GROUPS.forEach(group => {
      const gEl = document.createElement('div');
      gEl.className = 'pal-group';
      gEl.innerHTML = `<div class="pal-group-title">${group.title}</div>`;
      group.palettes.forEach(pal => {
        const rEl = document.createElement('div');
        rEl.className = 'pal-row';

        const hdrEl = document.createElement('div');
        hdrEl.className = 'pal-row-header';
        hdrEl.appendChild(document.createTextNode(pal.name));
        rEl.appendChild(hdrEl);

        const swEl = document.createElement('div');
        swEl.className = 'pal-swatches';

        pal.steps.forEach(step => {
          const token = `${pal.prefix}-${step}`;
          const hex   = _getHexFor('xq', token);
          const bg    = hex || 'transparent';
          const sw    = document.createElement('div');
          sw.className = 'swatch';
          sw.title = `點擊複製 ${token}`;
          sw.onclick = () => copyToken(token);
          sw.innerHTML = `
            <div class="swatch-box" style="background:${bg}"></div>
            <div class="swatch-step">${step}</div>
            <div class="swatch-hex">${hex || '—'}</div>`;
          swEl.appendChild(sw);
        });

        rEl.appendChild(swEl);
        gEl.appendChild(rEl);
      });
      container.appendChild(gEl);
    });
  }

  /* ── XQM 專屬色票 ── */
  const XQM_GROUPS = [
    { title: 'Main color_gray', tokens: [
      { s:'01', v:'--xqm-gray-01', note:'System_bg / List_bg' },
      { s:'02', v:'--xqm-gray-02', note:'Nav_bg / Table_even' },
      { s:'03', v:'--xqm-gray-03' },
      { s:'04', v:'--xqm-gray-04', note:'Float menu / List_line' },
      { s:'05', v:'--xqm-gray-05', note:'行情欄' },
      { s:'06', v:'--xqm-gray-06', note:'List_focus' },
      { s:'07', v:'--xqm-gray-07', note:'Disable / Placeholder' },
      { s:'08', v:'--xqm-gray-08' },
      { s:'09', v:'--xqm-gray-09', note:'Inactive_hold' },
      { s:'10', v:'--xqm-gray-10', note:'Inactive' },
      { s:'11', v:'--xqm-gray-11', note:'Popup_border' },
      { s:'12', v:'--xqm-gray-12', note:'Text_normal' },
      { s:'13', v:'--xqm-gray-13', note:'Text' },
      { s:'14', v:'--xqm-gray-14', note:'Text white' },
    ]},
    { title: 'Main color_blue', tokens: [
      { s:'01', v:'--xqm-blue-01', note:'盤後_選單_btn' },
      { s:'02', v:'--xqm-blue-02', note:'盤後_選單_bg' },
      { s:'03', v:'--xqm-blue-03', note:'card' },
      { s:'04', v:'--xqm-blue-04', note:'Table_title' },
      { s:'05', v:'--xqm-blue-05', note:'block' },
      { s:'06', v:'--xqm-blue-06', note:'Table_sub_title' },
      { s:'07', v:'--xqm-blue-07', note:'Float_menu_n' },
      { s:'08', v:'--xqm-blue-08' },
      { s:'09', v:'--xqm-blue-09' },
      { s:'10', v:'--xqm-blue-10', note:'Float_menu_focus' },
      { s:'11', v:'--xqm-blue-11', note:'Float_menu_focus' },
    ]},
    { title: 'Sub color', tokens: [
      { s:'01',   v:'--xqm-sub-01' },
      { s:'01_h', v:'--xqm-sub-01-h' },
      { s:'02',   v:'--xqm-sub-02' },
      { s:'02_h', v:'--xqm-sub-02-h' },
      { s:'03',   v:'--xqm-sub-03' },
      { s:'03_h', v:'--xqm-sub-03-h' },
      { s:'04',   v:'--xqm-sub-04' },
      { s:'04_h', v:'--xqm-sub-04-h' },
    ]},
    { title: 'Stock & Trade', tokens: [
      { s:'Up',         v:'--xqm-trade-up' },
      { s:'Up_h',       v:'--xqm-trade-up-h' },
      { s:'Up_dis',     v:'--xqm-trade-up-disable' },
      { s:'Up_50%',     v:'--xqm-trade-up-50' },
      { s:'Up_75%',     v:'--xqm-trade-up-75' },
      { s:'Up_vol',     v:'--xqm-trade-up-volume' },
      { s:'Up_vol_f',   v:'--xqm-trade-up-volume-f' },
      { s:'Down',       v:'--xqm-trade-down' },
      { s:'Down_h',     v:'--xqm-trade-down-h' },
      { s:'Down_dis',   v:'--xqm-trade-down-disable' },
      { s:'Down_50%',   v:'--xqm-trade-down-50' },
      { s:'Down_75%',   v:'--xqm-trade-down-75' },
      { s:'Down_vol',   v:'--xqm-trade-down-volume' },
      { s:'Down_vol_f', v:'--xqm-trade-down-volume-f' },
    ]},
    { title: 'System color', tokens: [
      { s:'Active',    v:'--xqm-active',    note:'Icon/Text/Btn' },
      { s:'Active_h',  v:'--xqm-active-h' },
      { s:'Active_02', v:'--xqm-active-02', note:'快速下單btn' },
      { s:'CTA',       v:'--xqm-cta',       note:'Btn/Link' },
      { s:'CTA_h',     v:'--xqm-cta-h' },
      { s:'Alert',     v:'--xqm-alert' },
      { s:'Warning',   v:'--xqm-warning' },
      { s:'Success',   v:'--xqm-success' },
      { s:'Count',     v:'--xqm-count',     note:'圖表count' },
      { s:'Empty',     v:'--xqm-empty',     note:'icon' },
      { s:'Tooltips',  v:'--xqm-tooltip',   note:'icon' },
    ]},
    { title: 'Other color', tokens: [
      { s:'01', v:'--xqm-other-01', note:'5% white' },
      { s:'02', v:'--xqm-other-02', note:'Base · 10% white' },
      { s:'03', v:'--xqm-other-03', note:'icon_holder_bg / inputfield · 15%' },
      { s:'04', v:'--xqm-other-04', note:'小工具 hold 底色 · 30%' },
      { s:'05', v:'--xqm-other-05', note:'Overlay · 75% black' },
    ]},
    { title: 'Chart color', tokens: [
      { s:'01_a', v:'--xqm-chart-01-a', note:'Orange' },
      { s:'01_b', v:'--xqm-chart-01-b' },
      { s:'02_a', v:'--xqm-chart-02-a', note:'Blue' },
      { s:'02_b', v:'--xqm-chart-02-b' },
      { s:'03_a', v:'--xqm-chart-03-a', note:'Violet' },
      { s:'03_b', v:'--xqm-chart-03-b' },
      { s:'04_a', v:'--xqm-chart-04-a', note:'Cyan' },
      { s:'04_b', v:'--xqm-chart-04-b' },
      { s:'05_a', v:'--xqm-chart-05-a', note:'Pink' },
      { s:'05_b', v:'--xqm-chart-05-b' },
      { s:'06_a', v:'--xqm-chart-06-a', note:'Red' },
      { s:'06_b', v:'--xqm-chart-06-b' },
      { s:'07_a', v:'--xqm-chart-07-a', note:'Lime' },
      { s:'07_b', v:'--xqm-chart-07-b' },
      { s:'08_a', v:'--xqm-chart-08-a', note:'Magenta' },
      { s:'08_b', v:'--xqm-chart-08-b' },
      { s:'09_a', v:'--xqm-chart-09-a', note:'Yellow' },
      { s:'09_b', v:'--xqm-chart-09-b' },
      { s:'10_a', v:'--xqm-chart-10-a', note:'Teal' },
      { s:'10_b', v:'--xqm-chart-10-b' },
      { s:'11_a', v:'--xqm-chart-11-a', note:'Indigo' },
      { s:'11_b', v:'--xqm-chart-11-b' },
      { s:'12_a', v:'--xqm-chart-12-a', note:'Orchid' },
      { s:'12_b', v:'--xqm-chart-12-b' },
    ]},
  ];

  function buildXqmPalettes() {
    const container = document.getElementById('xqm-palettes');
    container.innerHTML = '';
    XQM_GROUPS.forEach(group => {
      const gEl = document.createElement('div');
      gEl.className = 'pal-group';
      gEl.innerHTML = `<div class="pal-group-title">${group.title}</div>`;
      const swEl = document.createElement('div');
      swEl.className = 'pal-swatches';
      group.tokens.forEach(({ s, v, note }) => {
        const hex = _getHexFor('xqm', v);
        const bg  = hex || 'transparent';
        const sw  = document.createElement('div');
        sw.className = 'swatch';
        sw.title = `點擊複製 ${v}`;
        sw.onclick = () => copyToken(v);
        sw.innerHTML = `
          <div class="swatch-box" style="background:${bg};border:1px solid rgba(128,128,128,0.15)"></div>
          <div class="swatch-step">${s}</div>
          ${note ? `<div class="swatch-note">${note}</div>` : ''}
          <div class="swatch-hex">${hex || '—'}</div>`;
        swEl.appendChild(sw);
      });
      gEl.appendChild(swEl);
      container.appendChild(gEl);
    });
  }

  function copyToken(token) {
    navigator.clipboard.writeText(token).then(() => {
      const t = document.getElementById('toast');
      t.textContent = `已複製 ${token}`;
      t.classList.add('show');
      clearTimeout(t._tid);
      t._tid = setTimeout(() => t.classList.remove('show'), 1800);
    });
  }

  function setPlatformView(p) {
    document.documentElement.dataset.platform = p;
    document.getElementById('btn-xq').classList.toggle('active', p === 'xq');
    document.getElementById('btn-xqm').classList.toggle('active', p === 'xqm');
    document.getElementById('color-palettes').style.display = p === 'xqm' ? 'none' : '';
    document.getElementById('xqm-section').style.display    = p === 'xqm' ? '' : 'none';
    document.getElementById('btn-light').style.display      = p === 'xqm' ? 'none' : '';
    if (p === 'xqm') { setTheme('dark'); }
  }

  function setTheme(t) {
    document.documentElement.dataset.theme = t;
    ['dark', 'light'].forEach(id =>
      document.getElementById('btn-' + id).classList.toggle('active', id === t)
    );
    buildPalettes();
    buildXqmPalettes();
  }

  buildPalettes();
  buildXqmPalettes();
</script>
</body>
</html>
